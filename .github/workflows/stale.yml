name: Mark stale issues

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    permissions:
      issues: write  # for actions/stale to close stale issues
      pull-requests: write  # for actions/stale to close stale PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          stale-issue-message: "This issue has had no activity for 60 days and is now marked as stale. Remove the stale label or comment to keep it open; otherwise it will be closed in 20 days."
          close-issue-message: "This issue was closed after 20 days in stale state without activity. If it is still relevant, feel free to reopen it with updated context."
          stale-pr-message: "This pull request has had no activity for 60 days and is now marked as stale. Remove the stale label or comment to keep it open; otherwise it will be closed in 20 days."
          close-pr-message: "This PR was closed because it has been marked stale for 20 days with no activity."
          days-before-close: 20
