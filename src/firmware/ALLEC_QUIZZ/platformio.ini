; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200

lib_deps =
    ; AALeC V3 core library
    https://github.com/informatik-aalen/AALeC-V3.git
    ; WS2812B LEDs
    adafruit/Adafruit NeoPixel
    ; OLED SSD1306
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays
    ; Wii Nunchuck
    madhephaestus/WiiChuck
    ; BME environment sensors
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BME280 Library
    adafruit/Adafruit BMP280 Library
    adafruit/Adafruit BME680 Library
    ; MQTT
    knolleary/PubSubClient

build_flags =
    -D MQTT_MAX_PACKET_SIZE=512
    ; ── WiFi / MQTT ──────────────────────────────────────────────────────────
    ; Trage hier deine Zugangsdaten ein. Diese Datei ist NICHT gitignored,
    ; also keine echten Passwörter committen — nutze stattdessen eine lokale
    ; platformio.ini.local (gitignored) oder Umgebungsvariablen.
    -D WIFI_SSID=\"DEIN_NETZWERK\"
    -D WIFI_PASS=\"DEIN_PASSWORT\"
    -D MQTT_HOST=\"141.18.117.96\"
    -D MQTT_PORT=1883
