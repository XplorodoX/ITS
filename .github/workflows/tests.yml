name: Repository Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-workflows:
    name: Validate GitHub Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: actionlint
        uses: rhysd/actionlint@v1

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md

  repository-sanity:
    name: Repository Sanity Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate expected bootstrap structure
        run: |
          set -euo pipefail

          required_paths=(
            ".github/copilot-instructions.md"
            ".github/workflows/tests.yml"
            "docs"
            "diary"
            "src"
            "src/backend"
            "src/frontend"
            "src/firmware"
          )

          for path in "${required_paths[@]}"; do
            if [[ ! -e "$path" ]]; then
              echo "Missing required path: $path"
              exit 1
            fi
          done

          echo "Bootstrap structure looks good."
